<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia</title>
    <link rel="stylesheet" href="assents/CSS/estilo.css">
</head>
<body>
    
    <div class="login-container">
        <img src="assents/imagens/BarberFlow.png" alt="Logo" style="display: block; margin: 0 auto 20px; width: 140px;">
        <h1 style="color: white ;">Barbearia</h1>
        <form id="formLogin">
            <div>
                <label for="email" style="color: white ;">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div>
                <label for="senha" style="color: white ;">Senha:</label>
                <input type="password" id="senha" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <p id="mensagem"></p>
    </div>

    <script src="assents/JS/index.js"></script>
</body>
</html>
